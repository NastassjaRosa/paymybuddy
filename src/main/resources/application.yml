spring:
  datasource:
    url: jdbc:mysql://localhost:3307/paymybuddy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate: org.hibernate.dialect.MySQLDialect
      format_sql: true
  thymeleaf:
    cache: false

server:
  port: 8080

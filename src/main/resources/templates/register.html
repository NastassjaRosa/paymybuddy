<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="page">
    <div class="card">

        <div class="btn btn-orange">Pay My Buddy</div>

        <form class="form" th:action="@{/register}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input class="input" type="text" name="username" placeholder="Username" required>
            <input class="input" type="email" name="email" placeholder="Mail" required>
            <input class="input" type="password" name="password" placeholder="Mot de passe" required>

            <button class="btn btn-blue" type="submit">S’inscrire</button>


        </form>

        <p th:if="${error}" th:text="${error}"></p>
        <p th:if="${success}" th:text="${success}"></p>


    </div>
</div>
</body>
</html>

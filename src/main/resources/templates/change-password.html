<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Changer le mot de passe - Pay My Buddy</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<header class="topbar">
  <div class="topbar__brand">Pay My Buddy</div>
  <nav class="topbar__nav">
    <a class="topbar__link" th:href="@{/transfer}">Transférer</a>
    <a class="topbar__link" th:href="@{/profile}">Profil</a>
    <a class="topbar__link" th:href="@{/connections}">Ajouter relation</a>
    <a class="topbar__link" th:href="@{/logout}">Se déconnecter</a>
  </nav>
</header>

<main class="page">
  <section class="profile">

    <form class="profile__form" th:action="@{/profile/password}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="profile__row">
        <label class="profile__label">Nouveau mot de passe</label>
        <input class="input" type="password" name="password" required/>
      </div>

      <button class="btn btn--orange profile__btn" type="submit">
        Modifier
      </button>

    </form>

  </section>
</main>

</body>
</html>

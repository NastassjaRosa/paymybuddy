<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>

<header class="topbar" th:fragment="topbar(active)">
    <div class="topbar__brand">Pay My Buddy</div>

    <nav class="topbar__nav">
        <a class="topbar__link"
           th:href="@{/transfer}"
           th:classappend="${active == 'transfer'} ? ' is-active' : ''">
            Transférer
        </a>

        <a class="topbar__link"
           th:href="@{/profile}"
           th:classappend="${active == 'profile'} ? ' is-active' : ''">
            Profil
        </a>

        <a class="topbar__link"
           th:href="@{/connections}"
           th:classappend="${active == 'connections'} ? ' is-active' : ''">
            Ajouter relation
        </a>

        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="topbar__link" style="background:none;border:0;cursor:pointer;">
                Se déconnecter
            </button>
        </form>

    </nav>
</header>

</body>
</html>

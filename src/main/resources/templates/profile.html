<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Profil - Pay My Buddy</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<header class="topbar">
    <div class="topbar__brand">Pay My Buddy</div>
    <nav class="topbar__nav">
        <a class="topbar__link" th:href="@{/transfer}">Transférer</a>
        <a class="topbar__link is-active" th:href="@{/profile}">Profil</a>
        <a class="topbar__link" th:href="@{/connections}">Ajouter relation</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="topbar__link" style="background:none;border:0;cursor:pointer;">
                Se déconnecter
            </button>
        </form>

    </nav>
</header>

<main class="page">
    <section class="profile">

        <form class="profile__form" th:action="@{/profile}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="profile__row">
                <label class="profile__label">Username</label>
                <input class="input" type="text" name="username"
                       th:value="${user.username}" required/>
            </div>

            <div class="profile__row">
                <label class="profile__label">Mail</label>
                <input class="input" type="email" name="email"
                       th:value="${user.email}" required/>
            </div>

            <div class="profile__row">
                <label class="profile__label">Mot de passe</label>
                <a th:href="@{/profile/password}">Changer mon mot de passe</a>
            </div>

            <button class="btn btn--orange profile__btn" type="submit">
                Modifier
            </button>

        </form>

    </section>
</main>

</body>
</html>

<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Transférer - Pay My Buddy</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<header class="topbar">
    <div class="topbar__brand">Pay My Buddy</div>
    <nav class="topbar__nav">
        <a class="topbar__link is-active" th:href="@{/transfer}">Transférer</a>
        <a class="topbar__link" th:href="@{/profile}">Profil</a>
        <a class="topbar__link" th:href="@{/connections}">Ajouter relation</a>
        <a class="topbar__link" th:href="@{/logout}">Se déconnecter</a>
    </nav>
</header>

<main class="page">
    <section class="transfer">

        <form class="transfer__form" th:action="@{/transfer}" method="post">
            <select class="input" name="receiverEmail" required>
                <option value="" selected disabled>Sélectionner une relation</option>
                <option th:each="r : ${relations}"
                        th:value="${r.email}"
                        th:text="${r.username}">Relation</option>
            </select>

            <input class="input" type="text" name="description" placeholder="Description" maxlength="255" />

            <input class="input input--amount" type="number" name="amount" placeholder="0€"
                   step="0.01" min="0.01" required />

            <button class="btn btn--primary" type="submit">Payer</button>
        </form>

        <section class="card">
            <div class="card__title">Mes Transactions</div>

            <div class="table">
                <div class="table__head">
                    <div class="table__col table__col--rel">Relations</div>
                    <div class="table__col table__col--desc">Description</div>
                    <div class="table__col table__col--amt">Montant</div>
                </div>

                <div class="table__body">
                    <div class="table__row" th:each="tx : ${history}">
                        <div class="table__cell table__cell--rel"
                             th:text="${tx.receiver != null ? tx.receiver.username : '—'}">Laure-Anne</div>

                        <div class="table__cell table__cell--desc"
                             th:text="${tx.description != null ? tx.description : ''}">Restaurant</div>

                        <div class="table__cell table__cell--amt"
                             th:text="${tx.amount} + '€'">10€</div>
                    </div>
                </div>
            </div>
        </section>

    </section>
</main>

</body>
</html>
